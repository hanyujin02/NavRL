defaults:
  - _self_
  - drone       # sensor.depth_range/height/width/focal_length/horizontal_aperture
  - ppo         # algo settings + feature_extractor encoder options
  - sim

headless: False
device: "cuda:0"
seed: 0

# Total Training Length
max_frame_num: 12e8
eval_interval: 1000
save_interval: 1000

# Training Environment
env:
  num_envs: 2             # increase to 1024 for full training (RTX 4090 recommended)
  max_episode_length: 2200
  env_spacing: 8.0
  num_obstacles: 350

env_dyn:
  num_obstacles: 80       # set to 0 for static-only environment
  vel_range: [0.5, 1.5]
  local_range: [5.0, 5.0, 4.5]

viewer:
  eye: [0., 40., 40.]
  lookat: [0., 2.5, 0.]
  resolution: [960, 720]

wandb:
  project: NavRL-depth
  name: depth_training
  entity: CERLAB-UAV-RL-Navigation
  mode: offline           # set to 'online' to stream to wandb
  run_id:

# ---------------------------------------------------------------------------
# Depth camera sensor  (mirrors drone.yaml — set here for visibility)
# ---------------------------------------------------------------------------
sensor:
  depth_range: 4.0        # max sensing range (m); must match algo.feature_extractor.rep_depth_max_m
  depth_height: 64        # image height (pixels)
  depth_width: 64         # image width (pixels)
  focal_length: 10.0      # ~90 deg horizontal FOV: hfov = 2*atan(aperture/(2*focal_length))
  horizontal_aperture: 20.955

# ---------------------------------------------------------------------------
# Encoder selection  (overrides ppo.yaml defaults)
# ---------------------------------------------------------------------------
# Choose one block below and uncomment it, or pass overrides on the command line.

# ── Option A: Simple CNN trained from scratch (default) ──────────────────────
algo:
  feature_extractor:
    encoder_type: scratch
    embed_dim: 256

# ── Option B: ReachMap CNN+GRU with pretrained checkpoint ────────────────────
